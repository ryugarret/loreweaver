name: Desplegar en GitHub Pages

# Publica la app (carpeta dist/) en GitHub Pages en cada push a main.
# No hace falta tocar nada: la ruta base se ajusta sola al nombre del repo.

on:
  push:
    branches: [main]
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez (cancela los anteriores en curso).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Da la base_path correcta (/REPO para un repo normal, / para usuario.github.io).
      # Requiere que Pages esté activado en Settings → Pages → Source: GitHub Actions.
      - name: Configurar Pages
        id: pages
        uses: actions/configure-pages@v5

      - run: npm ci

      - name: Compilar
        run: npm run build
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}

      # Evita que GitHub procese el sitio con Jekyll.
      - run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
